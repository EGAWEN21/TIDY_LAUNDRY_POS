<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            prefix: 'tw-',
        }
    </script>
</head>
<body class="tw-bg-gray-100 tw-h-screen tw-m-0">
    <div class="tw-flex tw-h-full">
        <!-- Main right panel (like Line 89) -->
        <div class="tw-h-[calc(100vh-4rem)] tw-flex tw-flex-col tw-bg-white tw-w-[500px] tw-p-4 tw-border-l">
            <div class="tw-shrink-0 tw-bg-blue-100 tw-p-2 tw-mb-4">Header / Search</div>
            
            <!-- Outer Border Box (Line 171) -->
            <div class="tw-w-full tw-flex-1 tw-min-h-0 tw-flex tw-flex-col tw-rounded-lg tw-overflow-clip tw-border tw-border-red-500 tw-border-solid">
                
                <!-- Scroll Box (Line 172) -->
                <div class="tw-flex tw-flex-col tw-flex-1 tw-min-h-0 tw-w-full tw-overflow-auto custom-scroll tw-bg-green-100">
                    
                    <!-- Inner Box (Line 173) -->
                    <div class="tw-flex tw-flex-col tw-flex-1 tw-min-h-0 tw-w-full tw-min-w-[400px] tw-bg-yellow-100">
                        <table class="tw-w-full">
                            <thead class="tw-bg-gray-200">
                                <tr><th>Service</th><th>Price</th></tr>
                            </thead>
                            <tbody>
                                <tr><td>Item 1</td><td>$10</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <!-- Totals (Line 443) -->
                <div class="tw-mt-4 tw-flex tw-justify-between tw-bg-purple-100 tw-p-2">
                    Totals Section
                </div>
                
                <!-- Buttons (Line 513) -->
                <div class="tw-flex tw-gap-2 tw-mt-1 tw-p-2 tw-bg-orange-100">
                    <button class="tw-flex-1 tw-bg-blue-500 tw-text-white tw-p-2">Button</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
